scenarios:
  - scenario_id: S01
    scenario_name: Customer support chatbot
    business_context: Synthetic customer support AI assistant using retrieved support articles.
    components: [user_client, api_gateway, orchestrator, prompt_template, retrieval_pipeline, vector_database, llm_endpoint, audit_log]
    assets: [support_articles, user_profile, prompt_logs]
    trust_boundaries: [user_to_application, application_to_vector_database, application_to_llm_provider]
    data_flows: [user_prompt_to_orchestrator, orchestrator_to_retriever, retriever_to_vector_database, orchestrator_to_llm]
    expected_ai_threats: [indirect_prompt_injection, sensitive_context_leakage]
    expected_critical_threats: [sensitive_context_leakage]
    synthetic: true
