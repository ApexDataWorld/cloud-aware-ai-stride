framework: OWASP Top 10 for LLM Applications
mapping:
  prompt_injection:
    stride: Tampering
    cloud_aware_note: Retrieval and tool execution paths raise blast radius in managed AI services.
  insecure_output_handling:
    stride: Elevation of Privilege
    cloud_aware_note: Tool misuse can cross IAM boundaries.
  training_data_poisoning:
    stride: Tampering
    cloud_aware_note: Shared pipelines increase persistence of poisoned artifacts.
  excessive_agency:
    stride: Elevation of Privilege
    cloud_aware_note: Tool and workflow scope must be constrained by IAM and approval gates.
  sensitive_information_disclosure:
    stride: Information Disclosure
    cloud_aware_note: Cloud logging and replication policies change exposure.
  insecure_plugin_design:
    stride: Spoofing
    cloud_aware_note: MCP and tool ecosystems introduce identity, consent, and confused-deputy risks.
  model_denial_of_service:
    stride: Denial of Service
    cloud_aware_note: Autoscaling, queueing, and token-cost dynamics make availability and cost tightly coupled.
  supply_chain_vulnerabilities:
    stride: Elevation of Privilege
    cloud_aware_note: Model registry and CI/CD integrations broaden privilege scope.
