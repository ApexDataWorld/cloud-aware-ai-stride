name: Cloud-Aware STRIDE for AI Pipelines
version: 0.1.0
description: >
  Extension of STRIDE for LLM, RAG, MCP, MLOps, and cloud-native AI
  pipeline analysis using synthetic research scenarios.
reference_decomposition:
  - user-interface
  - api-gateway-auth
  - ai-orchestrator-agent-runtime
  - prompt-store
  - rag-retrieval-pipeline
  - embedding-model
  - vector-database
  - llm-model-gateway
  - mcp-client-tool-router
  - mcp-server-tool-registry
  - enterprise-api-database-saas
  - iam-workload-identity
  - secrets-management
  - logging-tracing
  - cicd-model-registry
  - human-approval-audit-workflow
method_steps:
  - define system objective and business context
  - create AI pipeline component diagram
  - identify assets actors data flows and trust boundaries
  - apply STRIDE to each component and data flow
  - add AI-specific threat prompts
  - apply cloud severity modifiers
  - produce mitigation backlog and validation metrics
categories:
  Spoofing:
    cloud_focus:
      - workload identity misuse
      - cross-tenant agent impersonation
      - forged MCP server identity
    ai_focus:
      - tool identity spoofing
      - synthetic user session takeover
  Tampering:
    cloud_focus:
      - prompt or retrieval corpus alteration through storage path abuse
      - CI/CD model artifact manipulation
      - policy bundle modification
    ai_focus:
      - prompt injection
      - embedding poisoning
      - model registry drift
  Repudiation:
    cloud_focus:
      - incomplete audit lineage across managed services
      - unsigned workflow execution claims
    ai_focus:
      - untracked prompt/tool invocation chains
      - unverifiable human-in-the-loop overrides
  Information Disclosure:
    cloud_focus:
      - over-broad IAM exposure
      - cross-region regulated data leakage
      - secret propagation into logs
    ai_focus:
      - training data memorization
      - retrieval leakage
      - system prompt disclosure
  Denial of Service:
    cloud_focus:
      - token budget exhaustion causing autoscaling cost spikes
      - queue starvation in inference pipelines
    ai_focus:
      - adversarial prompt amplification
      - vector index saturation
  Elevation of Privilege:
    cloud_focus:
      - lateral movement through service roles
      - notebook-to-control-plane escalation
    ai_focus:
      - excessive tool privileges
      - unsafe agent action chaining
      - confused deputy in MCP proxy flows
scoring_factors:
  base_severity: likelihood * impact
  cloud_adjustments:
    - privilege_boundary
    - blast_radius
    - persistence
    - detectability
    - reversibility
    - compliance_sensitivity
mitigation_families:
  - prompt and context controls
  - RAG controls
  - MCP and tool controls
  - MLOps and supply chain controls
  - cloud IAM controls
  - observability controls
