scenario_id: s12_sales_proposal_generator
title: Sales Proposal Generator
summary: Proposal assistant drafts responses using CRM data, product collateral, and retrieved customer requirements.
pipeline_type: rag
cloud: gcp
components:
  - name: sales-portal
    kind: user-interface
    trust_zone: enterprise
    cloud_dependency: firebase
  - name: proposal-orchestrator
    kind: application
    trust_zone: app
    cloud_dependency: cloud-run
  - name: crm-connector
    kind: external-system
    trust_zone: privileged
    cloud_dependency: saas
assets:
  - name: customer opportunity data
    sensitivity: high
    residency: cross-border
  - name: proposal templates
    sensitivity: moderate
    residency: cross-border
trust_boundaries:
  - source: enterprise
    target: app
    rationale: Sales teams submit customer context and requests into the generator.
  - source: app
    target: privileged
    rationale: CRM lookups and document retrieval reach privileged business systems.
cloud_context:
  provider: gcp
  identity_model: workload_identity
  sensitive_data: true
  regulated_data: possible
  multi_tenant: true
  network_exposure: internet-facing
expected_threat_categories:
  - prompt_injection
  - crm_data_disclosure
  - tool_abuse
  - proposal_repudiation
assumptions:
  - Customer records and proposals are synthetic.
  - The assistant produces drafts only and does not transmit customer communications.
security_objectives:
  - Protect opportunity data and proposal integrity.
  - Constrain tool use across CRM and document systems.
