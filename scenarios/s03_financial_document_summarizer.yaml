scenario_id: s03_financial_document_summarizer
title: Financial Document Summarizer
summary: Batch summarization pipeline for earnings decks, policy PDFs, and analyst notes.
pipeline_type: llm
cloud: gcp
components:
  - name: upload-bucket
    kind: storage
    trust_zone: intake
    cloud_dependency: gcs
  - name: preprocessing-job
    kind: batch
    trust_zone: app
    cloud_dependency: cloud-run
  - name: summarization-model
    kind: llm
    trust_zone: ai
    cloud_dependency: vertex-ai
assets:
  - name: board materials
    sensitivity: high
    residency: multi-region
  - name: analyst notes
    sensitivity: moderate
    residency: multi-region
trust_boundaries:
  - source: intake
    target: app
    rationale: Uploaded documents enter the summarization workflow.
  - source: app
    target: ai
    rationale: Processed context is sent for inference.
cloud_context:
  provider: gcp
  identity_model: workload_identity
  sensitive_data: true
  regulated_data: possible
  multi_tenant: false
  network_exposure: partner-connected
expected_threat_categories:
  - document_tampering
  - bucket_information_disclosure
  - model_denial_of_service
assumptions:
  - Source documents are synthetic financial examples.
  - Severity should reflect cross-region disclosure risk.
security_objectives:
  - Limit exposure of unreleased financial content.
  - Detect tampering in upload and preprocessing stages.
