scenario_id: s08_multitenant_analytics_assistant
title: Multi-Tenant Analytics Assistant
summary: Shared analytics copilot answers natural-language questions over isolated tenant datasets.
pipeline_type: analytics
cloud: aws
components:
  - name: tenant-api
    kind: application
    trust_zone: app
    cloud_dependency: lambda
  - name: query-planner
    kind: agent
    trust_zone: ai
    cloud_dependency: bedrock
  - name: warehouse
    kind: analytics
    trust_zone: data
    cloud_dependency: redshift
assets:
  - name: tenant usage telemetry
    sensitivity: high
    residency: single-region
  - name: synthetic billing datasets
    sensitivity: moderate
    residency: single-region
trust_boundaries:
  - source: app
    target: ai
    rationale: Natural-language requests are translated into query intents.
  - source: ai
    target: data
    rationale: Query plans reach tenant-isolated analytics tables.
cloud_context:
  provider: aws
  identity_model: service_roles
  sensitive_data: true
  regulated_data: possible
  multi_tenant: true
  network_exposure: internet-facing
expected_threat_categories:
  - cross_tenant_leakage
  - unsafe_query_generation
  - privilege_escalation
  - model_denial_of_service
assumptions:
  - Tenant separation is logical rather than physical.
  - Severity should heavily reflect blast radius across tenants.
security_objectives:
  - Prevent cross-tenant leakage.
  - Detect unsafe query generation and privilege escalation.
