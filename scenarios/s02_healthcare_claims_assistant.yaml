scenario_id: s02_healthcare_claims_assistant
title: Healthcare Claims Assistant
summary: Claims analyst copilot summarizing adjudication steps and policy rules for synthetic PHI-like records.
pipeline_type: llm
cloud: azure
components:
  - name: analyst-portal
    kind: user-interface
    trust_zone: enterprise
    cloud_dependency: app-service
  - name: policy-engine
    kind: rules
    trust_zone: enterprise
    cloud_dependency: functions
  - name: model-endpoint
    kind: llm
    trust_zone: ai
    cloud_dependency: azure-openai
assets:
  - name: synthetic claims corpus
    sensitivity: regulated
    residency: single-region
  - name: adjudication policy library
    sensitivity: high
    residency: single-region
trust_boundaries:
  - source: enterprise
    target: ai
    rationale: Claims context is sent to managed model infrastructure.
cloud_context:
  provider: azure
  identity_model: managed_identity
  sensitive_data: true
  regulated_data: present
  multi_tenant: false
  network_exposure: internal
expected_threat_categories:
  - sensitive_information_disclosure
  - memorization_leakage
  - audit_repudiation
  - excessive_agency
assumptions:
  - No real patient information is stored in the repository.
  - Compliance scoring should weigh regulated data handling.
security_objectives:
  - Preserve confidentiality of claim narratives.
  - Maintain traceable adjudication decisions.
