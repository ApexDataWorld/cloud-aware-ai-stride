scenario_id: s04_code_generation_assistant
title: Code Generation Assistant
summary: Developer copilot suggests code, shell commands, and CI changes for internal repositories.
pipeline_type: llm
cloud: hybrid
components:
  - name: ide-plugin
    kind: user-interface
    trust_zone: developer
    cloud_dependency: desktop
  - name: suggestion-api
    kind: application
    trust_zone: app
    cloud_dependency: kubernetes
  - name: llm-gateway
    kind: llm
    trust_zone: ai
    cloud_dependency: api-gateway
assets:
  - name: source repositories
    sensitivity: high
    residency: single-region
  - name: build tokens
    sensitivity: regulated
    residency: single-region
trust_boundaries:
  - source: developer
    target: app
    rationale: Suggested edits and prompts cross from local development into hosted services.
  - source: app
    target: ai
    rationale: Source snippets are shared with model endpoints.
cloud_context:
  provider: hybrid
  identity_model: developer_oauth_plus_workload_identity
  sensitive_data: true
  regulated_data: possible
  multi_tenant: false
  network_exposure: hybrid
expected_threat_categories:
  - insecure_output_handling
  - code_suggestion_tampering
  - secret_disclosure
  - pipeline_privilege_escalation
assumptions:
  - Repositories and tokens are synthetic stand-ins.
  - The assistant does not execute code automatically in this benchmark.
security_objectives:
  - Prevent unsafe code or command injection into developer workflows.
  - Protect secrets and repository integrity.
