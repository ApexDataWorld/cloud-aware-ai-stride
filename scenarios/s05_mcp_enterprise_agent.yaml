scenario_id: s05_mcp_enterprise_agent
title: MCP-Based Enterprise Agent
summary: Enterprise agent uses MCP servers to access ticketing, wiki, and change-management systems.
pipeline_type: mcp
cloud: hybrid
components:
  - name: enterprise-agent
    kind: agent
    trust_zone: enterprise
    cloud_dependency: kubernetes
  - name: mcp-gateway
    kind: tool-broker
    trust_zone: integration
    cloud_dependency: api-gateway
  - name: change-system
    kind: external-system
    trust_zone: privileged
    cloud_dependency: saas
assets:
  - name: change tickets
    sensitivity: high
    residency: cross-border
  - name: internal knowledge base
    sensitivity: high
    residency: cross-border
trust_boundaries:
  - source: enterprise
    target: integration
    rationale: Agent requests flow through MCP tool orchestration.
  - source: integration
    target: privileged
    rationale: Tool calls can trigger privileged enterprise actions.
cloud_context:
  provider: hybrid
  identity_model: delegated_tokens
  sensitive_data: true
  regulated_data: possible
  multi_tenant: true
  network_exposure: hybrid
expected_threat_categories:
  - tool_spoofing
  - confused_deputy
  - excessive_agency
  - tool_call_repudiation
assumptions:
  - MCP servers are represented synthetically.
  - Tool identity and authorization are critical risk drivers.
security_objectives:
  - Prevent forged MCP services and unsafe tool invocation chains.
  - Preserve action auditability.
